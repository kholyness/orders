<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Moroska Orders</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --bg-secondary: var(--tg-theme-secondary-bg-color, #f0f0f0);
      --text: var(--tg-theme-text-color, #000000);
      --hint: var(--tg-theme-hint-color, #999999);
      --link: var(--tg-theme-link-color, #2481cc);
      --accent: var(--tg-theme-button-color, #2481cc);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --tab-height: 56px;
      --sheet-radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
    }

    /* ── Main content area ── */
    #app {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }

    .tab-content { display: none; padding: 16px 16px 0; }
    .tab-content.active { display: block; }

    /* ── Tab bar ── */
    #tab-bar {
      height: calc(var(--tab-height) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
      background: var(--bg);
      border-top: 1px solid var(--bg-secondary);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--hint);
      font-size: 10px;
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn.active { color: var(--accent); }
    .tab-btn .tab-icon { font-size: 22px; line-height: 1; }

    /* ── Cards ── */
    .card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 8px 12px;
      margin-bottom: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { opacity: 0.7; }
    .card-main { flex: 1; min-width: 0; }
    .card-id { font-size: 11px; color: var(--hint); margin-bottom: 1px; }
    .card-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-subtitle { font-size: 12px; color: var(--hint); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-chevron { color: var(--hint); font-size: 20px; margin-left: 8px; flex-shrink: 0; }
    .msg-btn-wrap { width: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .msg-btn { background: none; border: none; color: var(--accent); border-radius: 8px; padding: 4px; font-size: 18px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; line-height: 1; }

    /* ── Section headers ── */
    .section-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--hint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 12px 0 6px;
    }
    .section-header:first-child { margin-top: 0; }

    /* ── Search + New order row ── */
    .orders-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }
    .search-wrap-inner {
      flex: 1;
      position: relative;
      min-width: 0;
    }
    .search-input {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 32px 9px 12px;
      background: var(--bg-secondary);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      color: var(--text);
      outline: none;
    }
    .search-input::placeholder { color: var(--hint); }
    .search-clear {
      display: none;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--hint);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
    }
    .search-clear.visible { display: block; }
    .btn-new-order {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 10px;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: brightness(0.78);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-new-order:active { opacity: 0.7; }

    /* ── Buttons ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      filter: brightness(0.78);
    }
    .btn-primary:active { opacity: 0.7; }
    .btn-primary:disabled { opacity: 0.45; }

    .btn-secondary {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--bg-secondary);
      color: var(--text);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      text-align: center;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-danger {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--bg-secondary);
      color: var(--tg-theme-destructive-text-color, #ff3b30);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Overlay + Bottom sheet ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    #overlay.visible { opacity: 1; pointer-events: all; }

    #sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
      z-index: 101;
      max-height: 92dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      padding: 0 16px 40px;
    }
    #sheet.visible { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--bg-secondary);
      border-radius: 2px;
      margin: 12px auto 20px;
      flex-shrink: 0;
    }

    /* ── Form fields ── */
    .field-group { margin-bottom: 14px; }
    .field-label { font-size: 13px; color: var(--hint); margin-bottom: 5px; }

    .field-input, .field-select, .field-textarea {
      width: 100%;
      padding: 11px 12px;
      background: var(--bg-secondary);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      font-family: inherit;
      -webkit-appearance: none;
    }
    .field-textarea { resize: none; min-height: 76px; }

    /* ── Type toggle ── */
    .type-toggle { display: flex; gap: 8px; }
    .type-option {
      flex: 1; padding: 11px; text-align: center;
      background: var(--bg-secondary);
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .type-option.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--bg);
    }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .stat-card {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-card.full { grid-column: 1 / -1; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--hint); margin-top: 2px; }

    .list-block {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 2px 12px;
      margin-bottom: 10px;
    }
    .list-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--bg);;
      font-size: 13px;
    }
    .list-row:last-child { border-bottom: none; }
    .list-row b { font-weight: 600; }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-input {
      width: 100%;
      padding: 11px 12px 11px 38px;
      background: var(--bg-secondary);
      border: none; border-radius: 10px;
      font-size: 15px; color: var(--text);
      outline: none; font-family: inherit;
      -webkit-appearance: none;
    }
    .search-icon {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--hint); font-size: 15px;
      pointer-events: none;
    }

    /* ── Detail view ── */
    .detail-rows { margin-bottom: 16px; }
    .detail-row {
      display: flex; align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--bg-secondary);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { font-size: 13px; color: var(--hint); width: 90px; flex-shrink: 0; padding-top: 1px; }
    .detail-val { font-size: 15px; flex: 1; word-break: break-word; }
    .detail-link { color: var(--link); text-decoration: none; }

    /* ── Misc ── */
    .empty { text-align: center; color: var(--hint); padding: 48px 16px; font-size: 15px; }
    .loading { text-align: center; padding: 48px; color: var(--hint); font-size: 15px; }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .sheet-subtitle { font-size: 13px; color: var(--hint); margin-top: -12px; margin-bottom: 16px; }

    /* ── Status badge ── */
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-left: 10px;
      white-space: nowrap;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .sb-work     { background: rgba(45,138,78,0.15);  color: #2d8a4e; }
    .sb-queue    { background: rgba(58,102,196,0.13); color: #3a66c4; }
    .sb-pause    { background: rgba(230,126,34,0.15); color: #c47a1a; }
    .sb-done     { background: rgba(123,31,162,0.12); color: #7b1fa2; }
    .sb-received { background: rgba(0,0,0,0.07);      color: var(--hint); }

    /* ── Status popup ── */
    #status-popup {
      display: none;
      position: fixed;
      z-index: 300;
      background: var(--bg);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.22);
      padding: 6px;
      min-width: 140px;
    }
    .sp-item {
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .sp-item:active { opacity: 0.7; }
    .sp-item.active { font-weight: 600; color: var(--accent); }

    .card:active { opacity: 0.7; }

    /* ── Buy status badges ── */
    .sb-tobuy  { background: rgba(58,102,196,0.13); color: #3a66c4; }
    .sb-bought { background: rgba(45,138,78,0.15);  color: #2d8a4e; }
  </style>
</head>
<body>

<div id="app">
  <div id="tab-orders" class="tab-content active"></div>
  <div id="tab-buy" class="tab-content"></div>
  <div id="tab-stats" class="tab-content"></div>
  <div id="tab-clients" class="tab-content"></div>
</div>

<nav id="tab-bar">
  <button class="tab-btn active" data-tab="orders">
    <span class="tab-icon">📋</span>
    <span>Заказы</span>
  </button>
  <button class="tab-btn" data-tab="buy">
    <span class="tab-icon">🛒</span>
    <span>Купить</span>
  </button>
  <button class="tab-btn" data-tab="stats">
    <span class="tab-icon">📊</span>
    <span>Статистика</span>
  </button>
  <button class="tab-btn" data-tab="clients">
    <span class="tab-icon">👤</span>
    <span>Клиенты</span>
  </button>
</nav>

<div id="status-popup">
  <div class="sp-item" data-status="Получен">Получен</div>
  <div class="sp-item" data-status="В работе">В работе</div>
  <div class="sp-item" data-status="Очередь">Очередь</div>
  <div class="sp-item" data-status="Пауза">Пауза</div>
  <div class="sp-item" data-status="Готово">Готово</div>
</div>

<div id="overlay"></div>
<div id="sheet">
  <div class="sheet-handle"></div>
  <div id="sheet-content"></div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function dmyToYmd(d) {
  const p = d.split('.');
  return p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : '';
}

// ── Config ───────────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxknNMX-2ANIBL249WNtr-TyAaZlGV2Mh1o5StY_kg6Vd_yfJfT_9ueRuqjAovaY9Jh/exec';
const MODELS = ['Lada','Larna','Verbena','Ilma','ролл','тарелочка','мусорничка','чехол пяльца','чехол рама','Taloma','Tala','Loboda'];
const STATUS_ORDER = ['Получен','В работе','Очередь','Пауза','Готово'];

// ── Telegram WebApp ──────────────────────────────────────────────────────────
const tg = window.Telegram.WebApp;
tg.expand();
if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();

// ── State ────────────────────────────────────────────────────────────────────
const state = { orders: [], archive: [], purchases: [], activeTab: 'orders' };


// ── API ──────────────────────────────────────────────────────────────────────
async function apiGet(action) {
  const res = await fetch(SCRIPT_URL + '?action=' + action + '&t=' + Date.now(), { redirect: 'follow' });
  return res.json();
}

async function apiPost(data) {
  const body = JSON.stringify({ ...data, initData: tg.initData });
  const encoded = btoa(unescape(encodeURIComponent(body)));
  const res = await fetch(SCRIPT_URL + '?write=' + encodeURIComponent(encoded) + '&t=' + Date.now(), { redirect: 'follow' });
  return res.json();
}

async function loadData() {
  const [a, b, c] = await Promise.all([apiGet('getOrders'), apiGet('getArchive'), apiGet('getPurchases')]);
  state.orders = a.orders || [];
  state.archive = b.orders || [];
  state.purchases = c.purchases || [];
}

async function refreshPurchases() {
  const res = await apiGet('getPurchases');
  state.purchases = res.purchases || [];
}

async function refreshOrders() {
  const res = await apiGet('getOrders');
  state.orders = res.orders || [];
}

// ── Navigation ───────────────────────────────────────────────────────────────
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  switchTab(btn.dataset.tab);
});

function switchTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
  if (tab === 'orders') renderOrders();
  if (tab === 'buy') renderBuy();
  if (tab === 'stats') renderStats();
  if (tab === 'clients') renderClients();
}

// ── Bottom sheet ─────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');
const sheetContent = document.getElementById('sheet-content');

function openSheet(html) {
  sheetContent.innerHTML = html;
  sheet.scrollTop = 0;
  overlay.classList.add('visible');
  sheet.classList.add('visible');
}

function closeSheet() {
  overlay.classList.remove('visible');
  sheet.classList.remove('visible');
}

overlay.addEventListener('click', closeSheet);

// ── STATUS BADGE POPUP ───────────────────────────────────────────────────────
function statusBadgeClass(status) {
  return { 'Получен': 'sb-received', 'В работе': 'sb-work', 'Очередь': 'sb-queue', 'Пауза': 'sb-pause', 'Готово': 'sb-done' }[status] || 'sb-queue';
}

let _statusPopupOrderId = null;

function openStatusPopup(e, order) {
  e.stopPropagation();
  const popup = document.getElementById('status-popup');
  if (popup.style.display === 'block' && _statusPopupOrderId === order.id) {
    closeStatusPopup();
    return;
  }
  _statusPopupOrderId = order.id;

  const rect = e.currentTarget.getBoundingClientRect();
  const popupW = 150;
  let left = rect.right - popupW;
  if (left < 8) left = 8;
  popup.style.top  = (rect.bottom + 6) + 'px';
  popup.style.left = left + 'px';

  popup.querySelectorAll('.sp-item').forEach(item => {
    item.classList.toggle('active', item.dataset.status === (order.status || 'Очередь'));
  });
  popup.style.display = 'block';
}

function closeStatusPopup() {
  document.getElementById('status-popup').style.display = 'none';
  _statusPopupOrderId = null;
}

document.getElementById('status-popup').addEventListener('click', async e => {
  const item = e.target.closest('.sp-item');
  if (!item || !_statusPopupOrderId) return;
  const newStatus = item.dataset.status;
  const order = state.orders.find(o => String(o.id) === String(_statusPopupOrderId));
  closeStatusPopup();
  if (order && newStatus !== order.status) {
    order.status = newStatus;
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    renderOrders();
    await apiPost({ action: 'updateStatus', id: order.id, status: newStatus });
  }
});

document.addEventListener('click', e => {
  const popup = document.getElementById('status-popup');
  if (popup.style.display !== 'none' && !popup.contains(e.target) && !e.target.closest('.status-badge')) {
    closeStatusPopup();
  }
});


// ── ORDERS TAB ───────────────────────────────────────────────────────────────
function renderOrders() {
  const el = document.getElementById('tab-orders');
  const prevSearch = el.querySelector('.search-input')?.value || '';
  const searchFocused = document.activeElement === el.querySelector('.search-input');

  const toolbar = `<div class="orders-toolbar">
    <div class="search-wrap-inner">
      <input class="search-input" id="order-search" placeholder="🔍 Поиск..." value="${esc(prevSearch)}">
      <button class="search-clear${prevSearch ? ' visible' : ''}" id="search-clear-btn" tabindex="-1">✕</button>
    </div>
    <button class="btn-new-order" id="btn-new-order">＋</button>
  </div>`;

  function bindSearch() {
    const si = el.querySelector('#order-search');
    const cb = el.querySelector('#search-clear-btn');
    si.addEventListener('input', () => renderOrders());
    cb.addEventListener('mousedown', e => { e.preventDefault(); si.value = ''; renderOrders(); });
  }

  if (!state.orders.length) {
    el.innerHTML = toolbar + '<div class="empty">Заказов пока нет</div>';
    el.querySelector('#btn-new-order').onclick = openNewOrderForm;
    bindSearch();
    return;
  }

  const q = prevSearch.toLowerCase().trim();

  const grouped = {};
  STATUS_ORDER.forEach(s => { grouped[s] = []; });
  state.orders.forEach(o => {
    if (q) {
      const hay = [o.name, o.item, o.model, String(o.id)].join(' ').toLowerCase();
      if (!hay.includes(q)) return;
    }
    const s = o.status || 'Очередь';
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(o);
  });

  function parseDeadline(d) {
    if (!d) return Infinity;
    const p = d.split('.');
    if (p.length !== 3) return Infinity;
    return new Date(p[2], p[1] - 1, p[0]).getTime();
  }
  STATUS_ORDER.forEach(s => {
    grouped[s].sort((a, b) => parseDeadline(a.deadline) - parseDeadline(b.deadline));
  });

  const totalFiltered = STATUS_ORDER.reduce((n, s) => n + grouped[s].length, 0);
  let html = toolbar;
  if (totalFiltered === 0) {
    html += '<div class="empty">Ничего не найдено</div>';
    el.innerHTML = html;
    el.querySelector('#btn-new-order').onclick = openNewOrderForm;
    bindSearch();
    el.querySelector('#order-search').focus();
    return;
  }

  STATUS_ORDER.forEach(status => {
    const list = grouped[status];
    if (!list.length) return;

    html += `<div class="status-section" data-status="${status}">`;
    html += `<div class="section-header">${status} <span style="color:var(--hint);font-weight:400;letter-spacing:0">(${list.length})</span></div>`;

    list.forEach(o => {
      const orderTitle = esc(o.item || o.model) || '—';
      const tgUsername = o.username || '';
      const clientName = esc(o.name || '') || '—';
      html += `
        <div class="card" data-id="${o.id}">
          <div class="card-main">
            <div class="card-id">#${o.rowNum}${o.deadline ? ' · ' + deadlineLabel(o.deadline) : ''}${o.note ? ' · <span style="color:var(--accent)">●</span>' : ''}</div>
            <div class="card-title">${orderTitle}</div>
            <div class="card-subtitle">${clientName}</div>
          </div>
          <div class="msg-btn-wrap">${tgUsername ? `<button class="msg-btn" data-username="${esc(tgUsername)}"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>` : ''}</div>
          <div class="status-badge ${statusBadgeClass(o.status)}" data-badge-id="${o.id}">${esc(o.status || 'Очередь')}</div>
        </div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = html;
  el.querySelector('#btn-new-order').onclick = openNewOrderForm;
  bindSearch();
  const si = el.querySelector('#order-search');
  if (searchFocused) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
  el.querySelectorAll('.status-badge[data-badge-id]').forEach(badge => {
    badge.addEventListener('click', e => {
      const order = state.orders.find(o => String(o.id) === String(badge.dataset.badgeId));
      if (order) openStatusPopup(e, order);
    });
  });

  el.querySelectorAll('.card[data-id]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.status-badge')) return;
      if (e.target.closest('.msg-btn')) {
        const username = e.target.closest('.msg-btn').dataset.username;
        tg.openTelegramLink(`https://t.me/${username}`);
        return;
      }
      openOrderDetail(card.dataset.id, state.orders);
    });
  });
}

// ── ORDER DETAIL ─────────────────────────────────────────────────────────────
function openOrderDetail(id, source) {
  const order = source.find(o => String(o.id) === String(id));
  if (!order) return;
  renderOrderDetail(order);
}

function renderOrderDetail(order) {
  const statusOptions = ['Очередь','В работе','Пауза','Готово']
    .map(s => `<option value="${s}"${order.status === s ? ' selected' : ''}>${s}</option>`)
    .join('');
  const modelOptions = ['', ...MODELS]
    .map(m => `<option value="${m}"${order.model === m ? ' selected' : ''}>${m || '— модель —'}</option>`)
    .join('');

  const f = (label, name, value, type = 'text') =>
    `<div class="field-group"><div class="field-label">${label}</div><input class="field-input" type="${type}" name="${name}" value="${esc(value || '')}"></div>`;

  const html = `
    <div class="sheet-title">#${order.id} ${esc(order.name) || ''}</div>
    ${f('Имя', 'name', order.name)}
    ${f('Username', 'username', order.username)}
    ${f('Изделие', 'item', order.item)}
    ${f('Артикул', 'article', order.article)}
    <div class="field-group"><div class="field-label">Модель</div><select class="field-select" name="model">${modelOptions}</select></div>
    <div class="field-group">
      <div class="field-label">Тип</div>
      <div class="type-toggle">
        <div class="type-option${order.type !== 'Наличие' ? ' selected' : ''}" data-val="Заказ">Заказ</div>
        <div class="type-option${order.type === 'Наличие' ? ' selected' : ''}" data-val="Наличие">Наличие</div>
      </div>
      <input type="hidden" name="type" value="${order.type || 'Заказ'}">
    </div>
    ${f('Детали', 'details', order.details)}
    ${f('Цена', 'price', order.price, 'number')}
    <div class="field-group"><div class="field-label">Срок</div><input class="field-input" type="date" name="deadline" value="${esc(dmyToYmd(order.deadline || ''))}"></div>
    ${f('Комментарий клиента', 'comment', order.comment)}
    ${f('Заметка', 'note', order.note)}
    <div class="field-group"><div class="field-label">Статус</div><select class="field-select" name="status">${statusOptions}</select></div>
    ${order.photo ? `<div style="margin-bottom:16px"><a class="detail-link" href="${order.photo}" target="_blank">📁 Открыть папку Drive</a></div>` : ''}
    <button class="btn-primary" id="btn-save" style="margin-top:8px">Сохранить</button>
    ${order.status === 'Готово' ? `<button class="btn-danger" id="btn-archive">Перенести в архив</button>` : ''}
  `;

  openSheet(html);

  sheetContent.querySelectorAll('.type-option').forEach(opt => {
    opt.onclick = () => {
      sheetContent.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      sheetContent.querySelector('input[name="type"]').value = opt.dataset.val;
    };
  });

  document.getElementById('btn-save').onclick = async () => {
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = 'Сохраняем...';
    const data = { action: 'updateOrder', id: order.id };
    sheetContent.querySelectorAll('[name]').forEach(inp => { data[inp.name] = inp.value; });
    if (data.deadline) {
      const p = data.deadline.split('-');
      if (p.length === 3) data.deadline = p[2] + '.' + p[1] + '.' + p[0];
    }
    await apiPost(data);
    Object.assign(order, data);
    await refreshOrders();
    renderOrderDetail(order);
    if (state.activeTab === 'orders') renderOrders();
  };

  const btnArchive = document.getElementById('btn-archive');
  if (btnArchive) btnArchive.onclick = async () => {
    btnArchive.disabled = true;
    btnArchive.textContent = 'Переносим...';
    await apiPost({ action: 'archiveOrder', id: order.id });
    const archRes = await apiGet('getArchive');
    state.archive = archRes.orders || [];
    await refreshOrders();
    closeSheet();
    renderOrders();
  };
}

// ── BUY TAB ───────────────────────────────────────────────────────────────────
function renderBuy() {
  const el = document.getElementById('tab-buy');

  const toBuy   = state.purchases.filter(p => p.status !== 'Куплено');
  const bought  = state.purchases.filter(p => p.status === 'Куплено');

  let html = `<button class="btn-new-order" id="btn-new-purchase" style="width:100%;border-radius:10px;height:40px;margin-bottom:16px;font-size:15px;font-weight:500">＋ Добавить</button>`;

  if (!state.purchases.length) {
    html += '<div class="empty">Список покупок пуст</div>';
    el.innerHTML = html;
    el.querySelector('#btn-new-purchase').onclick = openNewPurchaseForm;
    return;
  }

  function purchaseCard(p) {
    const done = p.status === 'Куплено';
    const parts = [];
    if (p.quantity) parts.push(esc(p.quantity));
    if (p.orderName) parts.push(`#${esc(p.orderId)} ${esc(p.orderName)}`);
    else if (p.orderId) parts.push(`#${esc(p.orderId)}`);
    const sub = parts.join(' · ');
    return `
      <div class="card" data-buy-row="${p.rowIndex}">
        <div class="card-main">
          <div class="card-title" style="${done ? 'text-decoration:line-through;opacity:0.5' : ''}">${esc(p.item)}</div>
          ${sub ? `<div class="card-subtitle">${sub}</div>` : ''}
          ${p.note ? `<div class="card-subtitle" style="color:var(--accent)">● ${esc(p.note)}</div>` : ''}
        </div>
        <div class="status-badge ${done ? 'sb-bought' : 'sb-tobuy'}" data-buy-badge="${p.rowIndex}">${done ? 'Куплено' : 'Купить'}</div>
      </div>`;
  }

  if (toBuy.length) {
    html += `<div class="section-header">Купить <span style="color:var(--hint);font-weight:400;letter-spacing:0">(${toBuy.length})</span></div>`;
    toBuy.forEach(p => { html += purchaseCard(p); });
  }
  if (bought.length) {
    html += `<div class="section-header" style="margin-top:12px">Куплено <span style="color:var(--hint);font-weight:400;letter-spacing:0">(${bought.length})</span></div>`;
    bought.forEach(p => { html += purchaseCard(p); });
  }

  el.innerHTML = html;
  el.querySelector('#btn-new-purchase').onclick = openNewPurchaseForm;

  el.querySelectorAll('.status-badge[data-buy-badge]').forEach(badge => {
    badge.addEventListener('click', async e => {
      e.stopPropagation();
      const row = badge.dataset.buyBadge;
      const p = state.purchases.find(p => String(p.rowIndex) === String(row));
      if (!p) return;
      if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
      p.status = p.status === 'Куплено' ? 'Купить' : 'Куплено';
      renderBuy();
      await apiPost({ action: 'togglePurchaseStatus', rowIndex: p.rowIndex });
    });
  });

  el.querySelectorAll('.card[data-buy-row]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.status-badge')) return;
      const p = state.purchases.find(p => String(p.rowIndex) === String(card.dataset.buyRow));
      if (p) openPurchaseDetail(p);
    });
  });
}

function _bindOrderIdAutofill() {
  const orderIdInput = document.getElementById('purchase-order-id');
  if (!orderIdInput) return;
  orderIdInput.addEventListener('input', e => {
    const order = state.orders.find(o => String(o.id) === e.target.value.trim());
    const nameInput = document.getElementById('purchase-order-name');
    if (order && nameInput) nameInput.value = order.name;
  });
}

function openNewPurchaseForm() {
  openSheet(`
    <div class="sheet-title">Новая покупка</div>
    <div class="field-group"><div class="field-label">Название</div><input class="field-input" name="item" placeholder="Что купить"></div>
    <div class="field-group"><div class="field-label">Количество</div><input class="field-input" name="quantity" placeholder="Например: 2 м, 3 шт"></div>
    <div class="field-group"><div class="field-label">Цена</div><input class="field-input" name="price" type="number" placeholder="0"></div>
    <div class="field-group"><div class="field-label">Номер заказа</div><input class="field-input" name="orderId" id="purchase-order-id" placeholder="Необязательно"></div>
    <div class="field-group"><div class="field-label">Клиент</div><input class="field-input" name="orderName" id="purchase-order-name" placeholder="Заполнится автоматически"></div>
    <div class="field-group"><div class="field-label">Заметки</div><textarea class="field-textarea" name="note" placeholder="Необязательно"></textarea></div>
    <button class="btn-primary" id="btn-submit-purchase" style="margin-top:8px">Добавить</button>
    <button class="btn-secondary" id="btn-cancel-purchase">Отмена</button>
  `);
  _bindOrderIdAutofill();
  document.getElementById('btn-cancel-purchase').onclick = closeSheet;
  document.getElementById('btn-submit-purchase').onclick = async () => {
    const btn = document.getElementById('btn-submit-purchase');
    btn.disabled = true; btn.textContent = 'Добавляем...';
    try {
      const data = { action: 'createPurchase', status: 'Купить' };
      sheetContent.querySelectorAll('[name]').forEach(inp => { data[inp.name] = inp.value; });
      const res = await apiPost(data);
      console.log('createPurchase response:', JSON.stringify(res));
      if (res.error) { alert('Ошибка: ' + res.error); btn.disabled = false; btn.textContent = 'Добавить'; return; }
      await refreshPurchases();
      closeSheet();
      renderBuy();
    } catch (e) {
      console.error('createPurchase catch:', e);
      btn.disabled = false; btn.textContent = 'Добавить';
      alert('Ошибка при добавлении: ' + e.message);
    }
  };
}

    const btn = document.getElementById('btn-delete-purchase');
    btn.disabled = true; btn.textContent = 'Удаляем...';
    await apiPost({ action: 'deletePurchase', rowIndex: p.rowIndex });
    await refreshPurchases();
    closeSheet();
    renderBuy();
  };

// ── CLIENTS TAB ───────────────────────────────────────────────────────────────
function renderClients(filter = '') {
  const el = document.getElementById('tab-clients');
  const all = state.orders.concat(state.archive);

  const map = {};
  all.forEach(o => {
    const name = (o.name || '').trim();
    if (!name) return;
    if (!map[name]) map[name] = [];
    map[name].push(o);
  });

  let clients = Object.entries(map)
    .map(([name, orders]) => ({ name, orders }))
    .sort((a, b) => b.orders.length - a.orders.length);

  if (filter) clients = clients.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));

  let html = `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="client-search" placeholder="Поиск по имени" value="${esc(filter)}">
    </div>`;

  if (!clients.length) {
    html += '<div class="empty">Клиентов не найдено</div>';
  } else {
    clients.forEach(c => {
      html += `
        <div class="card" data-client="${esc(c.name)}">
          <div class="card-main">
            <div class="card-title">${esc(c.name)}</div>
            <div class="card-subtitle">${c.orders.length} ${declOrders(c.orders.length)}</div>
          </div>
          <div class="card-chevron">›</div>
        </div>`;
    });
  }

  el.innerHTML = html;
  document.getElementById('client-search').oninput = e => renderClients(e.target.value);
  el.querySelectorAll('.card[data-client]').forEach(card => {
    card.onclick = () => openClientDetail(card.dataset.client);
  });
}

function openClientDetail(name) {
  const all = state.orders.concat(state.archive);
  const toMs = d => { const p = (d||'').split('.'); return p.length===3 ? new Date(+p[2],+p[1]-1,+p[0]).getTime() : 0; };
  const orders = all.filter(o => (o.name || '').trim() === name)
    .sort((a, b) => toMs(b.date) - toMs(a.date));
  const totalSpent = state.archive
    .filter(o => (o.name || '').trim() === name)
    .reduce((sum, o) => sum + (parseFloat(o.price) || 0), 0);

  const rows = orders.map(o => {
    const inArchive = !!state.archive.find(a => a.id === o.id);
    return `
      <div class="card" data-id="${o.id}" data-src="${inArchive ? 'archive' : 'orders'}">
        <div class="card-main">
          <div class="card-id">#${o.id}${o.date ? ' · ' + o.date : ''}</div>
          <div class="card-title">${esc(o.model || o.item) || '—'}</div>
          <div class="card-subtitle">${esc(o.status)}${o.price ? ' · ' + o.price + ' RSD' : ''}</div>
        </div>
        <div class="card-chevron">›</div>
      </div>`;
  }).join('');

  openSheet(`
    <div class="sheet-title">${esc(name)}</div>
    <div class="sheet-subtitle">${orders.length} ${declOrders(orders.length)} · ${totalSpent.toLocaleString('ru')} RSD</div>
    ${rows || '<div class="empty">Нет заказов</div>'}
  `);

  sheetContent.querySelectorAll('.card[data-id]').forEach(card => {
    card.onclick = () => {
      const src = card.dataset.src === 'archive' ? state.archive : state.orders;
      openOrderDetail(card.dataset.id, src);
    };
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function deadlineLabel(deadline) {
  if (!deadline) return '';
  const parts = deadline.split('.');
  if (parts.length !== 3) return deadline;
  const d = new Date(parts[2], parts[1] - 1, parts[0]);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return `<span style="color:#e53935">просрочено</span>`;
  let suffix = '';
  if (diff === 0) suffix = ' · сегодня';
  else suffix = ` · ${diff} дн.`;
  const urgent = diff <= 7;
  const label = deadline + suffix;
  return urgent ? `<span style="color:#e53935">${label}</span>` : label;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function declOrders(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'заказ';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'заказа';
  return 'заказов';
}

async function init() {
  document.getElementById('tab-orders').innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    await loadData();
  } catch (e) {
    document.getElementById('tab-orders').innerHTML = '<div class="empty">Ошибка загрузки данных</div>';
    return;
  }
  renderOrders();
}

init();
